site_name: OpenTrust
site_description: A theoretical framework for transparent, privacy-preserving communal lending funds
theme:
  name: null
  custom_dir: plumbus-theme

plugins:
  - search: {}
  - encryptcontent:
      global_password: !ENV [SITE_PASSWORD, '']
      title_prefix: ''
      summary: 'This content is password protected.'
      placeholder: 'Enter password'
      password_button: true
      password_button_text: 'Unlock'
      decryption_failure_message: 'Incorrect password.'
      encryption_info_message: 'Contact the author for access.'
      webcrypto: true
      remember_password: true
      kdf_pow: 3
      encrypted_something:
        toc: [aside, class]

nav:
  - Home: index.md
  - 1. The Problem: 01-the-problem.md
  - 2. Core Principles: 02-core-principles.md
  - 3. The Institutional Model: 03-the-institutional-model.md
  - 4. Privacy and Transparency: 04-privacy-and-transparency.md
  - 5. Governance and Decision-Making: 05-governance-and-decision-making.md
  - 6. Verification and Audit: 06-verification-and-audit.md
  - 7. Exceptions, Enforcement, and Failure: 07-exceptions-enforcement-and-failure.md
  - 8. Business Model: 08-business-model.md
  - 9. Visualizations: 09-visualization.md